<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Premium Auctions | قاعدة بيانات المزادات</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; padding: 20px; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 10px; }
        table.dataTable { background: #1e1e1e; color: #eee; }
        .dataTables_wrapper .dataTables_length, .dataTables_wrapper .dataTables_filter { color: #eee; margin-bottom: 15px; }
        table.dataTable tbody tr { background-color: #1e1e1e; }
        table.dataTable tbody tr:hover { background-color: #252525; }
        .bid-btn { background: #00d2ff; color: #000; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #00d2ff;">محرك بحث المزادات المميزة (50k+ Domains)</h2>
    <table id="auctionsTable" class="display responsive nowrap" style="width:100%">
        <thead>
            <tr>
                <th>الدومين</th>
                <th>ينتهي في</th>
                <th>السعر</th>
                <th>الزوار</th>
                <th>التقييم</th>
                <th>العمر</th>
                <th>رابط</th>
            </tr>
        </thead>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
$(document).ready(function() {
    $('#auctionsTable').DataTable({
        ajax: {
            url: 'data.json', // الملف الذي يرفعه السكريبت
            dataSrc: ''
        },
        columns: [
            { data: 'd' },
            { data: 'e' },
            { data: 'p', render: function(data) { return '$' + data; } },
            { data: 'v' },
            { data: 'a', render: function(data) { return '$' + data; } },
            { data: 'g' },
            { 
                data: 'l', 
                render: function(data, type, row) {
                    return `<a href="${data}" target="_blank" class="bid-btn">مزايدة</a>`;
                }
            }
        ],
        pageLength: 25,
        order: [[2, 'desc']], // ترتيب حسب السعر افتراضياً
        language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/ar.json' }
    });
});
</script>
</body>
</html>
